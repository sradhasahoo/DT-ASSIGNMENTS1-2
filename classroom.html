<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Evolved - Smart Classroom 2050</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700&family=DM+Mono:wght@300;400;500&display=swap');

        :root {
            --primary: #1a1f3a;
            --secondary: #00d9ff;
            --accent: #7c3aed;
            --cool-bg: #0f1729;
            --card-bg: #1a2847;
            --text-dark: #ffffff;
            --text-light: #b0b5c8;
            --border-color: #2d3a52;
            --highlight: #06f0ff;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(135deg, #0a0f1f 0%, #1a2847 100%);
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
        }

        /* Subtle organic background pattern with cool colors */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 217, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(124, 58, 237, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        body, p, span {
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 2rem 3rem;
            background: rgba(15, 23, 41, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: #00d9ff;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }

        nav ul {
            display: flex;
            gap: 3rem;
            list-style: none;
        }

        nav a {
            color: #c0c0c0;
            text-decoration: none;
            font-weight: 400;
            transition: all 0.3s ease;
            position: relative;
            font-size: 0.95rem;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--secondary);
            transition: width 0.3s ease;
        }

        nav a:hover {
            color: var(--secondary);
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 100px;
            position: relative;
            overflow: hidden;
        }

        .hero-content {
            text-align: center;
            z-index: 10;
            animation: fadeInUp 1s ease-out;
            max-width: 800px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-size: 4.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            line-height: 1.1;
            color: #ffffff;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .hero-subtitle {
            font-size: 1.3rem;
            color: #d0d0d0;
            margin-bottom: 2.5rem;
            line-height: 1.7;
            font-weight: 300;
        }

        .cta-button {
            display: inline-block;
            padding: 1.2rem 2.8rem;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 8px 24px rgba(212, 165, 116, 0.25);
            margin: 0.6rem;
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 0.5px;
        }

        .cta-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(212, 165, 116, 0.35);
        }

        .cta-button.secondary {
            background: transparent;
            color: var(--secondary);
            border: 2px solid var(--secondary);
            box-shadow: none;
        }

        .cta-button.secondary:hover {
            background: var(--secondary);
            color: white;
            box-shadow: 0 8px 24px rgba(212, 165, 116, 0.25);
        }

        /* Hero Illustration */
        .hero-illustration {
            position: absolute;
            width: 500px;
            height: 500px;
            right: 5%;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.15;
            z-index: 1;
        }

        /* Vision Section */
        .vision {
            padding: 8rem 3rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .vision-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3rem;
            margin-top: 3rem;
        }

        .vision-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            transition: all 0.4s ease;
            position: relative;
        }

        .vision-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.05), transparent);
            border-radius: 8px;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .vision-card:hover::before {
            opacity: 1;
        }

        .vision-card:hover {
            transform: translateY(-8px);
            border-color: var(--secondary);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
        }

        .vision-number {
            font-size: 3rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 0.5rem;
            line-height: 1;
        }

        .vision-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #00d9ff;
        }

        .vision-desc {
            color: #c0c0c0;
            font-size: 0.95rem;
            line-height: 1.8;
        }

        /* Section Titles */
        .section-title {
            font-size: 3rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: #ffffff;
            text-align: center;
            letter-spacing: -0.02em;
        }

        .section-subtitle {
            font-size: 1.1rem;
            color: #b8b8b8;
            text-align: center;
            max-width: 600px;
            margin: 0 auto 3rem;
            line-height: 1.7;
        }

        /* Features Section */
        .features {
            padding: 8rem 3rem;
            background: linear-gradient(180deg, transparent 0%, rgba(212, 165, 116, 0.02) 100%);
        }

        .features-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 3rem;
            margin-top: 3rem;
        }

        .feature-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 2rem;
            transition: all 0.4s ease;
            align-items: start;
        }

        .feature-card:hover {
            border-color: var(--secondary);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
            transform: translateY(-4px);
        }

        .feature-icon {
            font-size: 2.5rem;
            line-height: 1;
            min-width: 3rem;
        }

        .feature-content h3 {
            font-size: 1.2rem;
            margin-bottom: 0.8rem;
            color: #00d9ff;
        }

        .feature-content p {
            color: #c0c0c0;
            font-size: 0.95rem;
            line-height: 1.7;
        }

        /* VR Labs Section */
        .modules {
            padding: 8rem 3rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .modules-wrapper {
            margin-top: 3rem;
        }

        .module-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .module-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--secondary);
            transform: scaleY(0);
            transform-origin: top;
            transition: transform 0.4s ease;
        }

        .module-card:hover::before {
            transform: scaleY(1);
        }

        .module-card:hover {
            border-color: var(--secondary);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
            transform: translateX(8px);
        }

        .module-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .module-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #00d9ff;
        }

        .module-badge {
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .module-description {
            color: #c0c0c0;
            margin-bottom: 1.5rem;
            line-height: 1.7;
        }

        .module-meta {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .meta-item {
            font-size: 0.85rem;
            color: #c0c0c0;
        }

        .meta-label {
            font-weight: 600;
            color: #00d9ff;
        }

        /* AI Assistant Section */
        .ai-assistant-section {
            padding: 8rem 3rem;
            background: linear-gradient(180deg, transparent 0%, rgba(212, 165, 116, 0.02) 100%);
        }

        .ai-assistant-section .features-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 3rem;
            margin-top: 3rem;
        }

        /* Future Tech Stack */
        .tech-stack {
            padding: 8rem 3rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .tech-stack .vision-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-top: 3rem;
        }

        /* Specialized Modules */
        .special-modules {
            padding: 8rem 3rem;
        }

        .special-modules .modules-wrapper {
            margin-top: 3rem;
        }

        /* Dashboard Section */
        .dashboard {
            padding: 8rem 3rem;
            background: linear-gradient(180deg, transparent 0%, rgba(212, 165, 116, 0.02) 100%);
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 3rem;
            margin-top: 3rem;
        }

        .dashboard-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 2rem;
        }

        .student-profile-card {
            text-align: center;
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1.5rem;
        }

        .student-name {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .student-course {
            color: #c0c0c0;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 2rem;
        }

        .stat-box {
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.1), rgba(139, 111, 71, 0.05));
            padding: 1.2rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 0.3rem;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #c0c0c0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
